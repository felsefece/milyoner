<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milyoner Felsefe</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="initApp()">

    <audio id="bgMusic" loop>
        <source src="assets/audio/background_music.mp3" type="audio/mpeg">
    </audio>
    <audio id="introMusic">
        <source src="assets/audio/intro.mp3" type="audio/mpeg">
    </audio>

    <div id="volumeControl" onclick="toggleMute()" style="position: fixed; top: 15px; right: 15px; z-index: 1000; cursor: pointer; font-size: 22px; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border: 1px solid gold; user-select: none; -webkit-tap-highlight-color: transparent;">
        <span id="muteIcon">🔊</span>
    </div>

    <div id="startScreen">
        <h1 class="logo">KİM MİLYONER OLMAK İSTER</h1>
        <div class="login-area">
            <button class="startBtn" onclick="startGame()">OYUNA BAŞLA</button>
        </div>
    </div>

    <div id="gameScreen">
        <div id="quiz-area">
            <div id="timerContainer" style="display: none; margin-bottom: 15px;">
                <div id="timerCircle" style="width: 60px; height: 60px; border-radius: 50%; border: 4px solid gold; display: flex; align-items: center; justify-content: center; margin: 0 auto; font-size: 24px; font-weight: bold; background: rgba(0,0,0,0.5); color: gold; text-shadow: 0 0 5px black;">
                    30
                </div>
            </div>

            <div id="questionBox">
                <h2 id="question"></h2>
            </div>

            <div id="answers"></div>

            <div class="controls-container">
                <div class="lifelines">
                    <button id="btnFifty" onclick="useFifty()">%50<span class="cross"></span></button>
                    <button id="btnDouble" onclick="useDouble()">×2<span class="cross"></span></button>
                    <button id="btnAudience" onclick="useAudience()">👥<span class="cross"></span></button>
                    <button id="btnPhone" onclick="usePhone()">📞<span class="cross"></span></button>
                </div>
                <button class="quitBtn" onclick="quitGame()">ÇEKİL</button>
            </div>
        </div>

        <div id="moneyPyramid">
            <ul id="moneyList">
                <li data-level="15" class="safe">15. ₺1.000.000</li>
                <li data-level="14">14. ₺500.000</li>
                <li data-level="13">13. ₺250.000</li>
                <li data-level="12">12. ₺125.000</li>
                <li data-level="11">11. ₺60.000</li>
                <li data-level="10" class="safe">10. ₺30.000</li>
                <li data-level="9">9. ₺15.000</li>
                <li data-level="8">8. ₺7.500</li>
                <li data-level="7">7. ₺5.000</li>
                <li data-level="6">6. ₺3.000</li>
                <li data-level="5" class="safe">5. ₺2.000</li>
                <li data-level="4">4. ₺1.000</li>
                <li data-level="3">3. ₺500</li>
                <li data-level="2">2. ₺300</li>
                <li data-level="1">1. ₺100</li>
            </ul>
        </div>
    </div>

    <div id="customAlert" class="modal">
        <div class="modalContent alertContent">
            <p id="alertMessage"></p>
            <button id="alertBtn" class="startBtn">TAMAM</button>
        </div>
    </div>

    <div id="audienceModal" class="modal">
        <div class="modalContent">
            <h3>Seyirci Dağılımı</h3>
            <div id="chart"></div>
            <button onclick="closeAudience()">Kapat</button>
        </div>
    </div>

    <script src="js/questions.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
